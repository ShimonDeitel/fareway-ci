name: Fareway
options:
  bundleIdPrefix: com.shimondeitel.fareway
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fareway:
    type: application
    platform: iOS
    sources:
      - path: Fareway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fareway
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fareway/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FarewayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FarewayTests
      - path: Fareway.storekit
    dependencies:
      - target: Fareway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fareway.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FarewayUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FarewayUITests
    dependencies:
      - target: Fareway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fareway.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fareway:
    build:
      targets:
        Fareway: all
        FarewayTests: [test]
        FarewayUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fareway.storekit
    test:
      config: Debug
      storeKitConfiguration: Fareway.storekit
      targets:
        - FarewayTests
        - FarewayUITests
    archive:
      config: Release
